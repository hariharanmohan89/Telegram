services:
  - type: web
    name: telegram-secure-agent
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: MAX_INPUT_CHARS
        value: 2000
      - key: REQUEST_WINDOW_MS
        value: 60000
      - key: REQUEST_LIMIT
        value: 120
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_WEBHOOK_PATH_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
